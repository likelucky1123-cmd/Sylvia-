<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>莫蘭迪手札</title>
  
  <!-- iOS 與 Android 桌面應用程式 (PWA) 核心標籤 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="手札">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F4F1EA">
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- 引入 React 與 Babel 核心 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 LocalForage (本機深度儲存引擎) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

  <style>
    /* 防止手機端長按選取文字，讓它更像一個 Native App */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none;
    }
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    /* 🍏 專為 iPhone 瀏海與動態島設計的「安全區域」推移距離 */
    .safe-pt { padding-top: max(1.5rem, env(safe-area-inset-top)); }
    .safe-pb { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
  </style>

  <script>
    // 動態生成 PWA Service Worker 與 Manifest
    document.addEventListener("DOMContentLoaded", () => {
      const manifest = {
        name: "莫蘭迪時光手札",
        short_name: "手札",
        start_url: window.location.href,
        display: "standalone",
        background_color: "#F4F1EA",
        theme_color: "#F4F1EA",
        icons: [{
          src: "IMG_2476.png",
          sizes: "192x192",
          type: "image/png",
          purpose: "any maskable"
        }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(manifestBlob);
      document.head.appendChild(link);

      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = manifest.icons[0].src;
      document.head.appendChild(appleIcon);

      if ('serviceWorker' in navigator) {
        const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => e.waitUntil(clients.claim())); self.addEventListener('fetch', e => {});`;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>console.log('SW setup skipped'));
      }
    });
  </script>
</head>
<body class="bg-[#F4F1EA] text-gray-800 antialiased h-screen w-screen overflow-hidden">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- 莫蘭迪主題色系 ---
    const theme = {
      bg: 'bg-[#F4F1EA]',
      surface: 'bg-[#FCFAF8]',
      primary: 'bg-[#9BA495]',
      primaryHover: 'hover:bg-[#8A9484]',
      textDark: 'text-[#5C5C5C]',
      textLight: 'text-[#8C8C8C]',
      border: 'border-[#E5E0D8]'
    };

    const Icon = ({ name, className = '', onClick }) => (
      <i className={`fa-solid fa-${name} ${className}`} onClick={onClick}></i>
    );

    function App() {
      const [isLoading, setIsLoading] = useState(true);
      const [isAppUnlocked, setIsAppUnlocked] = useState(false);
      
      const [accountData, setAccountData] = useState(null);
      const [profile, setProfile] = useState({ username: '', bio: '', avatar: '' });
      const [timeline, setTimeline] = useState([]);
      const [folders, setFolders] = useState([]);
      const [files, setFiles] = useState([]);

      useEffect(() => {
        const loadLocalData = async () => {
          try {
            const acc = await localforage.getItem('diary_account');
            setAccountData(acc);
            
            const prof = await localforage.getItem('diary_profile') || { username: acc?.username || '新用戶', bio: '寫下一句屬於你的個性文案...', avatar: '' };
            setProfile(prof);
            
            const tl = await localforage.getItem('diary_timeline') || [];
            setTimeline(tl);
            
            const fldrs = await localforage.getItem('diary_folders') || [];
            setFolders(fldrs);
            
            const fls = await localforage.getItem('diary_files') || [];
            setFiles(fls);
          } catch (error) {
            console.error("資料載入失敗", error);
          } finally {
            setIsLoading(false);
          }
        };
        loadLocalData();
      }, []);

      const updateData = async (key, data, setter) => {
        setter(data);
        await localforage.setItem(key, data);
      };

      if (isLoading) {
        return <div className={`h-full w-full ${theme.bg} flex items-center justify-center`}><Icon name="spinner fa-spin" className="text-3xl text-[#9BA495]" /></div>;
      }

      if (!isAppUnlocked) {
        return <LockScreen 
          accountData={accountData} 
          onUnlock={() => setIsAppUnlocked(true)} 
          onRegisterSuccess={(data) => { 
            updateData('diary_account', data, setAccountData); 
            setIsAppUnlocked(true); 
          }} 
        />;
      }

      return <MainApp 
        profile={profile} setProfile={(d) => updateData('diary_profile', d, setProfile)}
        timeline={timeline} setTimeline={(d) => updateData('diary_timeline', d, setTimeline)}
        folders={folders} setFolders={(d) => updateData('diary_folders', d, setFolders)}
        files={files} setFiles={(d) => updateData('diary_files', d, setFiles)}
        onLock={() => setIsAppUnlocked(false)} 
      />;
    }

    // ==========================================
    // 1. 登入鎖定畫面
    // ==========================================
    function LockScreen({ accountData, onUnlock, onRegisterSuccess }) {
      const isLoginMode = !!accountData; 
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        setError('');
        if (isLoginMode) {
          if (accountData.username === username && accountData.password === password) {
            onUnlock();
          } else {
            setError('帳號或密碼錯誤，請重新輸入');
          }
        } else {
          if (!username || !password) return setError("請填寫完整資訊");
          if (password !== confirmPassword) return setError("兩次輸入的密碼不一致");
          onRegisterSuccess({ username, password, createdAt: Date.now() });
        }
      };

      return (
        <div className={`h-full w-full ${theme.bg} flex flex-col items-center justify-center p-6 pb-20 safe-pt`}>
          <div className={`${theme.surface} w-full max-w-md rounded-3xl shadow-xl p-8 space-y-8 border ${theme.border} animate-fade-in`}>
            <div className="text-center">
              <div className="w-16 h-16 bg-[#F4F1EA] rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="lock" className="text-3xl text-[#9BA495]" />
              </div>
              <h1 className={`text-2xl font-bold ${theme.textDark} tracking-wider mb-2`}>{isLoginMode ? '歡迎回到手札' : '建立本機專屬手札'}</h1>
              <p className={`${theme.textLight} text-sm`}>{isLoginMode ? '請輸入帳號密碼解鎖' : '資料將安全加密儲存於您的手機中'}</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="relative">
                <Icon name="user" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                <input type="text" placeholder="帳號" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={username} onChange={e => setUsername(e.target.value)} />
              </div>
              <div className="relative">
                <Icon name="lock" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                <input type="password" placeholder="密碼" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={password} onChange={e => setPassword(e.target.value)} />
              </div>
              {!isLoginMode && (
                <div className="relative">
                  <Icon name="circle-check" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                  <input type="password" placeholder="再次輸入密碼" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} />
                </div>
              )}
              {error && <p className="text-[#D1A3A3] text-sm text-center font-medium bg-[#F9ECEC] py-2 rounded-lg">{error}</p>}
              <button type="submit" className={`w-full py-4 rounded-2xl ${theme.primary} ${theme.primaryHover} text-white font-bold tracking-wide shadow-md flex justify-center active:scale-[0.98] transition-transform`}>
                {isLoginMode ? '解鎖' : '完成註冊'}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 主框架與導航欄
    // ==========================================
    function MainApp(props) {
      const [activeTab, setActiveTab] = useState('timeline');

      return (
        <div className={`h-full w-full flex flex-col ${theme.bg}`}>
          {/* 內容區域的滾動層 */}
          <div className="flex-1 overflow-y-auto pb-24">
            {activeTab === 'timeline' && <TimelineTab {...props} />}
            {activeTab === 'database' && <DatabaseTab {...props} />}
            {activeTab === 'search' && <SearchTab timeline={props.timeline} files={props.files} />}
            {activeTab === 'profile' && <ProfileTab {...props} />}
          </div>
          {/* 底部導航列 (也加入了 safe-pb 確保底部不被橫條擋住) */}
          <div className={`fixed bottom-0 left-0 right-0 ${theme.surface} border-t ${theme.border} px-6 py-3 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.02)] z-40 safe-pb`}>
            <NavButton icon="clock" label="時光" active={activeTab === 'timeline'} onClick={() => setActiveTab('timeline')} />
            <NavButton icon="folder" label="資料庫" active={activeTab === 'database'} onClick={() => setActiveTab('database')} />
            <NavButton icon="magnifying-glass" label="搜索" active={activeTab === 'search'} onClick={() => setActiveTab('search')} />
            <NavButton icon="circle-user" label="我的" active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} />
          </div>
        </div>
      );
    }

    function NavButton({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`flex flex-col items-center space-y-1 transition-colors ${active ? 'text-[#9BA495]' : 'text-[#B8B8B8]'}`}>
          <Icon name={icon} className="text-xl" />
          <span className="text-[10px] font-medium">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 3. 時光軌跡 (已加入 safe-pt 防瀏海)
    // ==========================================
    function TimelineTab({ timeline, setTimeline }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editEventId, setEditEventId] = useState(null);
      const [eventData, setEventData] = useState({ title: '', date: '', location: '', text: '', mood: '平靜' });
      const [actionMenuEvent, setActionMenuEvent] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      const openAddModal = () => { setEventData({ title: '', date: '', location: '', text: '', mood: '平靜' }); setEditEventId(null); setErrorMsg(''); setIsModalOpen(true); };
      const openEditModal = (event) => { setEventData({ title: event.title, date: event.date, location: event.location, text: event.text, mood: event.mood }); setEditEventId(event.id); setActionMenuEvent(null); setErrorMsg(''); setIsModalOpen(true); };

      const handleSaveEvent = () => {
        if (!eventData.title || !eventData.date) return setErrorMsg("請填寫完整的事件名稱與時間");
        const newEvent = { ...eventData, id: editEventId || Date.now().toString(), timestamp: Date.now() };
        let newTimeline;
        if (editEventId) newTimeline = timeline.map(e => e.id === editEventId ? newEvent : e);
        else newTimeline = [newEvent, ...timeline];
        newTimeline.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
        setTimeline(newTimeline);
        setIsModalOpen(false); 
      };

      const handleDeleteEvent = (id) => {
        if (!window.confirm("確定要刪除這筆紀錄嗎？")) return;
        setTimeline(timeline.filter(e => e.id !== id));
        setActionMenuEvent(null);
      };

      return (
        <div className="p-4 safe-pt relative min-h-full">
          <div className="flex justify-between items-center mb-8 px-2">
            <h2 className={`text-2xl font-bold ${theme.textDark}`}>時光軌跡</h2>
            <button onClick={openAddModal} className={`w-10 h-10 rounded-full ${theme.primary} text-white shadow-md flex items-center justify-center active:scale-95`}><Icon name="plus" className="text-lg"/></button>
          </div>

          <div className="relative w-full max-w-2xl mx-auto py-4">
            <div className="absolute left-1/2 top-0 bottom-0 w-0.5 bg-[#D3CDC4] transform -translate-x-1/2 rounded-full"></div>
            {timeline.length === 0 && <div className="text-center text-[#AFAFAF] mt-20 relative z-10">還沒有紀錄，點擊右上角新增。</div>}
            
            {timeline.map((event, index) => {
              const isLeft = index % 2 === 0;
              return (
                <div key={event.id} className={`relative flex items-center justify-between w-full mb-8 ${isLeft ? 'flex-row-reverse' : ''}`}>
                  <div className="w-5/12"></div>
                  <div className="w-2/12 flex justify-center z-10"><div className={`w-3.5 h-3.5 rounded-full border-2 border-white ${theme.primary} shadow-sm`}></div></div>
                  <div className={`w-5/12 flex ${isLeft ? 'justify-end pr-2' : 'justify-start pl-2'}`}>
                    <div className={`${theme.surface} p-4 rounded-2xl shadow-sm border ${theme.border} w-full max-w-[260px] relative group`}>
                      <button onClick={() => setActionMenuEvent(event)} className="absolute top-2 right-2 p-2 text-[#C5B8B1] hover:text-[#9BA495]"><Icon name="ellipsis-vertical" /></button>
                      <div className="text-[10px] text-[#A0A0A0] mb-1 pr-6">{event.date.replace('T', ' ')}</div>
                      <h3 className={`font-bold text-sm ${theme.textDark} mb-1 pr-4`}>{event.title}</h3>
                      {event.location && <div className="flex items-center text-[10px] text-[#9BA495] mb-2"><Icon name="location-dot" className="mr-1" /> {event.location}</div>}
                      <p className={`text-xs ${theme.textDark} whitespace-pre-wrap mb-2 leading-relaxed`}>{event.text}</p>
                      <div className="inline-block px-2 py-1 bg-[#F0ECE5] rounded-md text-[10px] text-[#7C7C7C]">心情: {event.mood}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 編輯選單與彈窗維持不變 */}
          {actionMenuEvent && (
            <div className="fixed inset-0 bg-black/20 flex items-center justify-center z-[150] p-4" onClick={() => setActionMenuEvent(null)}>
              <div className={`${theme.surface} w-64 rounded-3xl p-3 shadow-xl flex flex-col`} onClick={e => e.stopPropagation()}>
                <div className="px-3 pb-2 border-b border-[#E5E0D8] mb-2"><span className="text-sm font-bold text-[#5C5C5C] truncate block">{actionMenuEvent.title}</span></div>
                <button onClick={() => openEditModal(actionMenuEvent)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-[#F4F1EA] text-[#5C5C5C]"><Icon name="pen" className="text-[#A2B2B7] w-5 text-center" /> <span>編輯</span></button>
                <button onClick={() => handleDeleteEvent(actionMenuEvent.id)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-red-50 text-red-500"><Icon name="trash" className="w-5 text-center" /> <span>刪除</span></button>
              </div>
            </div>
          )}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] pb-0 sm:p-4">
              <div className={`${theme.surface} w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl space-y-4 animate-slide-up pb-8 sm:pb-6`}>
                <h3 className={`text-lg font-bold ${theme.textDark}`}>{editEventId ? '編輯紀錄' : '紀錄新事件'}</h3>
                <div className="space-y-3">
                  <input type="text" placeholder="事件名稱" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.title} onChange={e => setEventData({...eventData, title: e.target.value})} />
                  <input type="datetime-local" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.date} onChange={e => setEventData({...eventData, date: e.target.value})} />
                  <input type="text" placeholder="地點 (選填)" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.location} onChange={e => setEventData({...eventData, location: e.target.value})} />
                  <textarea placeholder="紀錄詳細的心情與細節..." rows="3" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm resize-none`} value={eventData.text} onChange={e => setEventData({...eventData, text: e.target.value})} />
                  <div className="flex items-center space-x-3 bg-white p-2 rounded-xl border border-[#E5E0D8]">
                    <div className="p-2 bg-[#F4F1EA] rounded-lg"><Icon name="face-smile" className="text-[#9BA495]" /></div>
                    <select className={`flex-1 p-2 bg-transparent outline-none text-sm`} value={eventData.mood} onChange={e => setEventData({...eventData, mood: e.target.value})}>
                      <option>平靜</option><option>開心</option><option>期待</option><option>感動</option><option>傷心</option><option>生氣</option><option>疲憊</option>
                    </select>
                  </div>
                </div>
                {errorMsg && <p className="text-[#D1A3A3] text-sm text-center">{errorMsg}</p>}
                <div className="flex space-x-3 pt-3">
                  <button onClick={() => setIsModalOpen(false)} className="flex-1 py-3.5 rounded-2xl bg-[#EBEBEB] text-[#7C7C7C] font-medium text-sm">取消</button>
                  <button onClick={handleSaveEvent} className={`flex-1 py-3.5 rounded-2xl ${theme.primary} text-white font-medium text-sm active:scale-95`}>儲存</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4. 資料庫 (已加入 safe-pt 防瀏海)
    // ==========================================
    function DatabaseTab({ folders, setFolders, files, setFiles }) {
      const [currentFolder, setCurrentFolder] = useState(null);
      const [isUploadModalOpen, setIsUploadModalOpen] = useState(false);
      const [uploadError, setUploadError] = useState('');
      const [previewFile, setPreviewFile] = useState(null);
      const [actionMenuFile, setActionMenuFile] = useState(null);
      const [uploadData, setUploadData] = useState({ folderId: '', newFolderName: '', name: '', note: '', dataUrl: '', type: '', size: 0 });

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => { setUploadData({ ...uploadData, name: file.name, type: file.type || 'unknown', dataUrl: event.target.result, size: file.size }); setUploadError(''); };
        reader.readAsDataURL(file); 
      };

      const handleUploadSubmit = () => {
        if (!uploadData.dataUrl && uploadData.type !== 'text') return setUploadError("請選擇檔案");
        if (!uploadData.folderId && !uploadData.newFolderName) return setUploadError("請選擇資料夾");
        if (!uploadData.name) return setUploadError("請填寫檔案名稱");

        let targetFolderId = uploadData.folderId;
        if (!targetFolderId) { targetFolderId = 'folder_' + Date.now(); setFolders([...folders, { id: targetFolderId, name: uploadData.newFolderName, createdAt: Date.now() }]); }
        const newFile = { id: 'file_' + Date.now(), folderId: targetFolderId, name: uploadData.name, type: uploadData.type, note: uploadData.note, size: uploadData.size, dataUrl: uploadData.dataUrl, createdAt: Date.now() };
        setFiles([newFile, ...files]);
        setIsUploadModalOpen(false);
      };

      const handleDownload = (file) => {
        const link = document.createElement('a');
        link.href = file.type === 'text' ? `data:text/plain;charset=utf-8,${encodeURIComponent(file.dataUrl)}` : file.dataUrl;
        link.download = file.name;
        link.click();
        setActionMenuFile(null);
      };

      const handleDelete = (file) => { if (!window.confirm("確定刪除檔案？")) return; setFiles(files.filter(f => f.id !== file.id)); setActionMenuFile(null); };
      const handleDeleteFolder = (folderId) => { if (!window.confirm("確定刪除資料夾及裡面所有檔案嗎？")) return; setFolders(folders.filter(f => f.id !== folderId)); setFiles(files.filter(f => f.folderId !== folderId)); setCurrentFolder(null); };

      const currentFiles = files.filter(f => f.folderId === currentFolder?.id);

      return (
        <div className="p-4 safe-pt h-full flex flex-col relative">
          <div className="flex justify-between items-center mb-6 px-2">
            <div className="flex items-center space-x-3">
              {currentFolder && <button onClick={() => setCurrentFolder(null)} className="p-2"><Icon name="arrow-left" className="text-xl" /></button>}
              <h2 className={`text-2xl font-bold ${theme.textDark} truncate max-w-[180px]`}>{currentFolder ? currentFolder.name : '資料庫'}</h2>
            </div>
            <div className="flex space-x-2">
              {currentFolder && <button onClick={() => handleDeleteFolder(currentFolder.id)} className="w-10 h-10 rounded-full bg-red-50 text-red-400 flex justify-center items-center"><Icon name="trash" /></button>}
              <button onClick={() => { setUploadData({ folderId: currentFolder?.id || '', newFolderName: '', name: '', note: '', dataUrl: '', type: '', size: 0 }); setIsUploadModalOpen(true); }} className={`w-10 h-10 rounded-full ${theme.primary} text-white shadow-md flex justify-center items-center`}><Icon name="plus" /></button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto pb-6">
            {!currentFolder ? (
              <div className="grid grid-cols-2 gap-4 px-2">
                {folders.length === 0 && <div className="col-span-2 text-center text-[#AFAFAF] mt-10">尚無資料夾</div>}
                {folders.map(folder => (
                  <div key={folder.id} onClick={() => setCurrentFolder(folder)} className={`${theme.surface} p-5 rounded-3xl shadow-sm border ${theme.border} flex flex-col items-center cursor-pointer active:scale-95`}>
                    <Icon name="folder" className="text-4xl text-[#C5B8B1] mb-3 opacity-80" />
                    <span className={`font-medium text-sm ${theme.textDark} w-full text-center truncate`}>{folder.name}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div className="space-y-3 px-2">
                {currentFiles.length === 0 && <div className="text-center text-[#AFAFAF] mt-10">空的</div>}
                {currentFiles.map(file => (
                  <div key={file.id} className={`${theme.surface} p-3 rounded-2xl shadow-sm border ${theme.border} flex items-center justify-between`}>
                    <div className="flex items-center space-x-3 flex-1 overflow-hidden" onClick={() => setPreviewFile(file)}>
                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${theme.bg}`}><Icon name={file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : file.type.startsWith('audio/') ? 'music' : 'file-lines'} className="text-[#A0A0A0] text-lg" /></div>
                      <div className="flex-1 min-w-0"><h4 className={`text-sm font-medium ${theme.textDark} truncate`}>{file.name}</h4>{file.note && <p className="text-[10px] text-[#A0A0A0] truncate">{file.note}</p>}</div>
                    </div>
                    <button onClick={() => setActionMenuFile(file)} className="p-3 text-[#C5B8B1] active:text-[#9BA495]"><Icon name="ellipsis-vertical" /></button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* 預覽與上傳彈窗維持不變，僅微調預覽頂部防瀏海 */}
          {previewFile && (
            <div className="fixed inset-0 bg-black/95 flex flex-col z-[300]">
              <div className="flex justify-between items-center p-4 text-white bg-gradient-to-b from-black/60 safe-pt">
                <button onClick={() => setPreviewFile(null)} className="p-2"><Icon name="arrow-left" className="text-xl" /></button>
                <span className="font-medium text-sm truncate max-w-[60%]">{previewFile.name}</span>
                <button onClick={() => handleDownload(previewFile)} className="p-2"><Icon name="download" className="text-lg" /></button>
              </div>
              <div className="flex-1 flex items-center justify-center p-4 overflow-auto">
                {previewFile.type.startsWith('image/') && <img src={previewFile.dataUrl} className="max-w-full max-h-full object-contain" />}
                {previewFile.type.startsWith('video/') && <video src={previewFile.dataUrl} controls autoPlay className="max-w-full max-h-full" />}
                {previewFile.type.startsWith('audio/') && <div className="bg-[#2A2A2A] p-8 rounded-3xl"><Icon name="music" className="text-5xl text-white mb-6 block text-center opacity-80" /><audio src={previewFile.dataUrl} controls autoPlay /></div>}
                {previewFile.type === 'text' && <div className="bg-white p-6 rounded-xl w-full max-w-lg min-h-[50%] overflow-y-auto whitespace-pre-wrap text-[#4A4A4A] text-sm">{previewFile.dataUrl}</div>}
              </div>
            </div>
          )}

          {isUploadModalOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] pb-0 sm:p-4">
              <div className={`${theme.surface} w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl space-y-4 animate-slide-up pb-8`}>
                <h3 className={`text-lg font-bold ${theme.textDark}`}>加入本機資料庫</h3>
                <div className="space-y-2">
                  <select className={`w-full p-3 rounded-xl bg-white border ${theme.border} text-sm`} value={uploadData.folderId} onChange={e => setUploadData({...uploadData, folderId: e.target.value, newFolderName: ''})}><option value="">-- 建立新資料夾 --</option>{folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}</select>
                  {!uploadData.folderId && <input type="text" placeholder="新資料夾名稱" className={`w-full p-3 rounded-xl bg-white border ${theme.border} text-sm mt-2`} value={uploadData.newFolderName} onChange={e => setUploadData({...uploadData, newFolderName: e.target.value})} />}
                </div>
                <div className="flex space-x-2">
                  <button onClick={() => setUploadData({...uploadData, type: 'text', dataUrl: '', name: '純文字筆記'})} className={`flex-1 py-2 text-sm rounded-lg border ${uploadData.type === 'text' ? 'bg-[#F0ECE5] border-[#9BA495] text-[#9BA495]' : 'border-[#E5E0D8] bg-white'}`}>文字</button>
                  <label className={`flex-1 py-2 text-sm text-center rounded-lg border cursor-pointer ${uploadData.type !== 'text' && uploadData.type !== '' ? 'bg-[#F0ECE5] border-[#9BA495] text-[#9BA495]' : 'border-[#E5E0D8] bg-white'}`}>媒體 <input type="file" className="hidden" onChange={handleFileChange} /></label>
                </div>
                {uploadData.type === 'text' ? <textarea placeholder="輸入內容..." rows="3" className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.dataUrl} onChange={e => setUploadData({...uploadData, dataUrl: e.target.value})} /> : uploadData.dataUrl && <div className="text-xs text-[#9BA495]"><Icon name="circle-check"/> 已選擇檔案</div>}
                <input type="text" placeholder="檔案名稱 (含副檔名)" className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.name} onChange={e => setUploadData({...uploadData, name: e.target.value})} />
                <input type="text" placeholder="加入備註..." className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.note} onChange={e => setUploadData({...uploadData, note: e.target.value})} />
                {uploadError && <p className="text-red-400 text-xs text-center">{uploadError}</p>}
                <div className="flex space-x-3 pt-2">
                  <button onClick={() => setIsUploadModalOpen(false)} className="flex-1 py-3 rounded-xl bg-[#EBEBEB] text-sm font-bold text-[#7C7C7C]">取消</button>
                  <button onClick={handleUploadSubmit} className={`flex-1 py-3 rounded-xl ${theme.primary} text-white text-sm font-bold active:scale-95`}>儲存</button>
                </div>
              </div>
            </div>
          )}

          {actionMenuFile && (
            <div className="fixed inset-0 bg-black/20 flex items-end sm:items-center justify-center z-[150] pb-6 sm:p-0" onClick={() => setActionMenuFile(null)}>
              <div className={`${theme.surface} w-[90%] sm:w-80 rounded-3xl p-4 shadow-xl flex flex-col space-y-2`} onClick={e => e.stopPropagation()}>
                <div className="pb-3 border-b border-[#E5E0D8] px-2"><h4 className="font-bold text-sm text-[#5C5C5C] truncate">{actionMenuFile.name}</h4></div>
                <button onClick={() => handleDownload(actionMenuFile)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-[#F4F1EA] text-[#5C5C5C] text-sm"><Icon name="download" className="text-[#9BA495] w-5 text-center" /> <span>下載原始檔</span></button>
                <button onClick={() => handleDelete(actionMenuFile)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-red-50 text-red-500 text-sm"><Icon name="trash" className="w-5 text-center" /> <span>永久刪除</span></button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. 搜索頁面 (已加入 safe-pt 防瀏海)
    // ==========================================
    function SearchTab({ timeline, files }) {
      const [keyword, setKeyword] = useState('');
      const results = useMemo(() => {
        if (!keyword.trim()) return { events: [], files: [] };
        const lowerKw = keyword.toLowerCase();
        return {
          events: timeline.filter(e => e.title.toLowerCase().includes(lowerKw) || e.text.toLowerCase().includes(lowerKw)),
          files: files.filter(f => f.name.toLowerCase().includes(lowerKw) || (f.note && f.note.toLowerCase().includes(lowerKw)))
        };
      }, [keyword, timeline, files]);

      return (
        <div className="p-4 safe-pt h-full flex flex-col">
          <div className="px-2 mb-6">
            <h2 className={`text-2xl font-bold ${theme.textDark} mb-4`}>全域搜索</h2>
            <div className="relative">
              <Icon name="magnifying-glass" className={`absolute left-4 top-4 ${theme.textLight}`} />
              <input type="text" placeholder="尋找回憶或資料..." className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white shadow-sm border ${theme.border} outline-none text-sm`} value={keyword} onChange={e => setKeyword(e.target.value)} />
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-2 space-y-6">
            {!keyword.trim() && <div className="text-center text-[#AFAFAF] mt-20"><Icon name="magnifying-glass" className="text-4xl opacity-20 mb-3 block" /><p className="text-sm">輸入關鍵字尋找</p></div>}
            {keyword.trim() && results.events.length === 0 && results.files.length === 0 && <div className="text-center text-sm text-[#AFAFAF] mt-10">找不到相關結果</div>}
            {results.events.length > 0 && (
              <div>
                <h3 className={`font-bold ${theme.textLight} mb-3 text-xs`}>時光軌跡</h3>
                <div className="space-y-3">{results.events.map(e => <div key={e.id} className={`${theme.surface} p-4 rounded-2xl border ${theme.border}`}><h4 className="font-bold text-sm">{e.title}</h4><p className="text-xs text-[#A0A0A0] my-1">{e.date}</p><p className="text-xs line-clamp-2">{e.text}</p></div>)}</div>
              </div>
            )}
            {results.files.length > 0 && (
              <div>
                <h3 className={`font-bold ${theme.textLight} mb-3 text-xs`}>資料庫</h3>
                <div className="space-y-3">{results.files.map(f => <div key={f.id} className={`${theme.surface} p-3 rounded-2xl border ${theme.border} flex items-center space-x-3`}><Icon name="file-lines" className="text-[#A0A0A0] text-lg w-8 text-center" /><span className="text-sm font-medium truncate">{f.name}</span></div>)}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 6. 個人頁面 (已加入 safe-pt 防瀏海)
    // ==========================================
    function ProfileTab({ profile, setProfile, onLock }) {
      const [isEditing, setIsEditing] = useState(false);
      const [editForm, setEditForm] = useState(profile);
      const [showPwaGuide, setShowPwaGuide] = useState(false);
      const fileInputRef = useRef(null);
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      const handleAvatarChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 300; let { width, height } = img;
            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
            setEditForm({ ...editForm, avatar: canvas.toDataURL('image/jpeg', 0.8) });
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSave = () => { setProfile(editForm); setIsEditing(false); };

      return (
        <div className="p-4 safe-pt flex flex-col items-center relative h-full">
          <div className="w-full flex justify-end pr-2 mb-4 h-10">
            {isEditing ? <button onClick={handleSave} className={`px-4 py-1.5 rounded-full ${theme.primary} text-white text-xs font-bold`}>儲存</button>
             : <button onClick={() => { setEditForm(profile); setIsEditing(true); }} className="p-2 text-[#A0A0A0]"><Icon name="pen" /></button>}
          </div>

          <div className="relative mb-6">
            <div className={`w-24 h-24 rounded-full border-[3px] border-white shadow-md overflow-hidden bg-[#F0ECE5] flex items-center justify-center`}>
              {(isEditing ? editForm.avatar : profile.avatar) ? <img src={isEditing ? editForm.avatar : profile.avatar} className="w-full h-full object-cover" /> : <Icon name="user" className="text-3xl text-[#C5B8B1]" />}
            </div>
            {isEditing && <button onClick={() => fileInputRef.current?.click()} className="absolute bottom-0 right-0 p-2 bg-white rounded-full shadow border border-gray-100"><Icon name="pen" className="text-[#A2B2B7] text-xs" /></button>}
            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleAvatarChange} />
          </div>

          {isEditing ? (
            <div className="w-full max-w-sm space-y-4 px-4">
              <input type="text" className={`w-full p-3 text-center text-lg font-bold rounded-xl border ${theme.border} outline-none`} value={editForm.username} onChange={e => setEditForm({...editForm, username: e.target.value})} placeholder="名字" />
              <textarea className={`w-full p-3 text-center rounded-xl border ${theme.border} text-sm resize-none outline-none`} rows="2" value={editForm.bio} onChange={e => setEditForm({...editForm, bio: e.target.value})} placeholder="文案..." />
            </div>
          ) : (
            <div className="text-center w-full max-w-sm px-4">
              <h2 className={`text-xl font-bold ${theme.textDark} mb-2`}>{profile.username}</h2>
              <p className="text-[#8C8C8C] text-sm leading-relaxed whitespace-pre-wrap">{profile.bio}</p>
            </div>
          )}

          {!isEditing && (
            <div className="w-full max-w-sm mt-10 space-y-3 px-4">
              <div className="flex items-center justify-center space-x-2 text-xs text-[#9BA495] bg-[#E8F1ED] py-2 rounded-lg mb-4">
                <Icon name="shield-check" /> <span>本機隱私模式啟用中，資料安全不外洩</span>
              </div>
              <button onClick={() => window.confirm("確定登出並鎖定？") && onLock()} className="w-full flex justify-center space-x-2 p-4 mt-4 text-[#A0A0A0] text-sm font-bold"><Icon name="right-from-bracket" /> <span>鎖定手札</span></button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
