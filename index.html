<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>莫蘭迪手札</title>
  
  <!-- iOS 與 Android 桌面應用程式 (PWA) 核心標籤 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="手札">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F4F1EA">
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 FontAwesome 圖示庫 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- 引入 React 與 Babel 核心 (讓網頁可直接解析 React 語法) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入 Firebase 核心套件 -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* 防止手機端長按選取文字，讓它更像一個 Native App */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior-y: none; /* 防止 Safari 彈性滾動 */
    }
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out; }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>

  <script>
    // --- 動態生成 PWA Service Worker 與 Manifest (核心：讓手機認定這是一個 App) ---
    document.addEventListener("DOMContentLoaded", () => {
      // 1. 動態建立 App 圖示與 Manifest
      const manifest = {
        name: "莫蘭迪時光手札",
        short_name: "手札",
        start_url: window.location.href,
        display: "standalone", /* 關鍵設定：隱藏網址列，全螢幕運行 */
        background_color: "#F4F1EA",
        theme_color: "#F4F1EA",
        icons: [{
          src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%239BA495'/%3E%3Ctext x='50' y='68' font-size='55' font-weight='bold' font-family='sans-serif' text-anchor='middle' fill='white'%3E札%3C/text%3E%3C/svg%3E",
          sizes: "192x192",
          type: "image/svg+xml",
          purpose: "any maskable"
        }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const manifestUrl = URL.createObjectURL(manifestBlob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = manifestUrl;
      document.head.appendChild(link);

      // 動態建立 iOS 桌面圖示
      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = manifest.icons[0].src;
      document.head.appendChild(appleIcon);

      // 2. 註冊基礎 Service Worker (騙過瀏覽器，允許加入主畫面)
      if ('serviceWorker' in navigator) {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('activate', e => e.waitUntil(clients.claim()));
          self.addEventListener('fetch', e => {}); 
        `;
        const swBlob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(swBlob);
        navigator.serviceWorker.register(swUrl).catch(err => console.log('SW Registration failed:', err));
      }
    });
  </script>
</head>
<body class="bg-[#F4F1EA] text-gray-800 antialiased h-screen w-screen overflow-hidden">
  <div id="root" class="h-full w-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- Firebase 初始化設定 ---
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo-project" };
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'morandi-diary-pwa';

    // --- 莫蘭迪主題色系 ---
    const theme = {
      bg: 'bg-[#F4F1EA]',
      surface: 'bg-[#FCFAF8]',
      primary: 'bg-[#9BA495]',
      primaryHover: 'hover:bg-[#8A9484]',
      textDark: 'text-[#5C5C5C]',
      textLight: 'text-[#8C8C8C]',
      border: 'border-[#E5E0D8]'
    };

    // --- 共用圖示元件 ---
    const Icon = ({ name, className = '', onClick }) => (
      <i className={`fa-solid fa-${name} ${className}`} onClick={onClick}></i>
    );

    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [isAppUnlocked, setIsAppUnlocked] = useState(false);
      const [accountData, setAccountData] = useState(null);

      // 全域資料
      const [profile, setProfile] = useState({ username: '', bio: '', avatar: '' });
      const [timeline, setTimeline] = useState([]);
      const [folders, setFolders] = useState([]);
      const [files, setFiles] = useState([]);

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else {
              await auth.signInAnonymously();
            }
          } catch (error) {
            console.error("Auth error:", error);
          }
        };
        initAuth();

        const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
          setFirebaseUser(currentUser);
          if (currentUser) {
            const accRef = db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('account').doc('info');
            const accSnap = await accRef.get();
            if (accSnap.exists) setAccountData(accSnap.data());
            else setAccountData(null);
          }
          setAuthLoading(false);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!firebaseUser || !isAppUnlocked) return;
        const userId = firebaseUser.uid;
        
        const profileRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('profile').doc('main');
        const timelineRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('timeline');
        const foldersRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('folders');
        const filesRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('files');

        const unsubProfile = profileRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setProfile(docSnap.data());
          else {
            const defaultProfile = { username: accountData?.username || '新用戶', bio: '寫下一句屬於你的個性文案...', avatar: '' };
            profileRef.set(defaultProfile);
            setProfile(defaultProfile);
          }
        });

        const unsubTimeline = timelineRef.onSnapshot((snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => new Date(b.date).getTime() - new Date(a.date).getTime());
          setTimeline(data);
        });

        const unsubFolders = foldersRef.onSnapshot((snapshot) => {
          setFolders(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const unsubFiles = filesRef.onSnapshot((snapshot) => {
          const fData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          fData.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
          setFiles(fData);
        });

        return () => { unsubProfile(); unsubTimeline(); unsubFolders(); unsubFiles(); };
      }, [firebaseUser, isAppUnlocked, accountData]);

      if (authLoading) {
        return <div className={`h-full w-full ${theme.bg} flex items-center justify-center`}><Icon name="spinner fa-spin" className="text-3xl text-[#9BA495]" /></div>;
      }

      if (!isAppUnlocked) {
        return <LockScreen userId={firebaseUser?.uid} accountData={accountData} onUnlock={() => setIsAppUnlocked(true)} onRegisterSuccess={(data) => { setAccountData(data); setIsAppUnlocked(true); }} />;
      }

      return <MainApp user={firebaseUser} profile={profile} timeline={timeline} folders={folders} files={files} onLock={() => setIsAppUnlocked(false)} />;
    }

    // ==========================================
    // 1. 登入鎖定畫面
    // ==========================================
    function LockScreen({ userId, accountData, onUnlock, onRegisterSuccess }) {
      const isLoginMode = !!accountData; 
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [confirmPassword, setConfirmPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          if (isLoginMode) {
            if (accountData.username === username && accountData.password === password) onUnlock();
            else setError('帳號或密碼錯誤，請重新輸入');
          } else {
            if (!username || !password) throw new Error("請填寫完整資訊");
            if (password !== confirmPassword) throw new Error("兩次輸入的密碼不一致");
            const accRef = db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('account').doc('info');
            const newAccData = { username, password, createdAt: Date.now() };
            await accRef.set(newAccData);
            onRegisterSuccess(newAccData);
          }
        } catch (err) { setError(err.message); } 
        finally { setLoading(false); }
      };

      return (
        <div className={`h-full w-full ${theme.bg} flex flex-col items-center justify-center p-6 pb-20`}>
          <div className={`${theme.surface} w-full max-w-md rounded-3xl shadow-xl p-8 space-y-8 border ${theme.border} animate-fade-in`}>
            <div className="text-center">
              <div className="w-16 h-16 bg-[#F4F1EA] rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="lock" className="text-3xl text-[#9BA495]" />
              </div>
              <h1 className={`text-2xl font-bold ${theme.textDark} tracking-wider mb-2`}>{isLoginMode ? '歡迎回到手札' : '建立專屬手札'}</h1>
              <p className={`${theme.textLight} text-sm`}>{isLoginMode ? '請輸入帳號密碼解鎖' : '設定帳密確保資料隱私'}</p>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div className="relative">
                <Icon name="user" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                <input type="text" placeholder="帳號" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={username} onChange={e => setUsername(e.target.value)} />
              </div>
              <div className="relative">
                <Icon name="lock" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                <input type="password" placeholder="密碼" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={password} onChange={e => setPassword(e.target.value)} />
              </div>
              {!isLoginMode && (
                <div className="relative">
                  <Icon name="circle-check" className={`absolute left-4 top-4 text-lg ${theme.textLight}`} />
                  <input type="password" placeholder="再次輸入密碼" required className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white border ${theme.border} focus:outline-none focus:ring-2 focus:ring-[#9BA495]`} value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} />
                </div>
              )}
              {error && <p className="text-[#D1A3A3] text-sm text-center font-medium bg-[#F9ECEC] py-2 rounded-lg">{error}</p>}
              <button type="submit" disabled={loading} className={`w-full py-4 rounded-2xl ${theme.primary} ${theme.primaryHover} text-white font-bold tracking-wide shadow-md flex justify-center`}>
                {loading ? <Icon name="spinner fa-spin" /> : (isLoginMode ? '解鎖' : '完成註冊')}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 主框架與導航欄
    // ==========================================
    function MainApp({ user, profile, timeline, folders, files, onLock }) {
      const [activeTab, setActiveTab] = useState('timeline');

      return (
        <div className={`h-full w-full flex flex-col ${theme.bg}`}>
          {/* 內容區塊 - 設定 padding bottom 避免被導航欄遮擋，設定 safe-area 適應瀏海屏 */}
          <div className="flex-1 overflow-y-auto pb-24 pt-safe">
            {activeTab === 'timeline' && <TimelineTab user={user} timeline={timeline} />}
            {activeTab === 'database' && <DatabaseTab user={user} folders={folders} files={files} />}
            {activeTab === 'search' && <SearchTab timeline={timeline} files={files} />}
            {activeTab === 'profile' && <ProfileTab user={user} profile={profile} onLock={onLock} />}
          </div>

          {/* 底部導航 - 加入 padding-bottom: env(safe-area-inset-bottom) 以適應 iPhone 底部橫條 */}
          <div className={`fixed bottom-0 left-0 right-0 ${theme.surface} border-t ${theme.border} px-6 py-3 flex justify-between items-center shadow-[0_-4px_20px_rgba(0,0,0,0.02)] z-40 pb-[max(0.75rem,env(safe-area-inset-bottom))]`}>
            <NavButton icon="clock" label="時光" active={activeTab === 'timeline'} onClick={() => setActiveTab('timeline')} />
            <NavButton icon="folder" label="資料庫" active={activeTab === 'database'} onClick={() => setActiveTab('database')} />
            <NavButton icon="magnifying-glass" label="搜索" active={activeTab === 'search'} onClick={() => setActiveTab('search')} />
            <NavButton icon="circle-user" label="我的" active={activeTab === 'profile'} onClick={() => setActiveTab('profile')} />
          </div>
        </div>
      );
    }

    function NavButton({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`flex flex-col items-center space-y-1 transition-colors ${active ? 'text-[#9BA495]' : 'text-[#B8B8B8]'}`}>
          <Icon name={icon} className="text-xl" />
          <span className="text-[10px] font-medium">{label}</span>
        </button>
      );
    }

    // ==========================================
    // 3. 時光軌跡
    // ==========================================
    function TimelineTab({ user, timeline }) {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [loading, setLoading] = useState(false);
      const [editEventId, setEditEventId] = useState(null);
      const [eventData, setEventData] = useState({ title: '', date: '', location: '', text: '', mood: '平靜' });
      const [actionMenuEvent, setActionMenuEvent] = useState(null);
      const [errorMsg, setErrorMsg] = useState('');

      const openAddModal = () => { setEventData({ title: '', date: '', location: '', text: '', mood: '平靜' }); setEditEventId(null); setErrorMsg(''); setIsModalOpen(true); };
      const openEditModal = (event) => { setEventData({ title: event.title, date: event.date, location: event.location, text: event.text, mood: event.mood }); setEditEventId(event.id); setActionMenuEvent(null); setErrorMsg(''); setIsModalOpen(true); };

      const handleSaveEvent = async () => {
        if (!eventData.title || !eventData.date) return setErrorMsg("請填寫完整的事件名稱與時間");
        setLoading(true);
        try {
          const colRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('timeline');
          if (editEventId) await colRef.doc(editEventId).update(eventData);
          else await colRef.add({ ...eventData, timestamp: Date.now() });
          setIsModalOpen(false); 
        } catch (e) { setErrorMsg("儲存發生錯誤"); } 
        finally { setLoading(false); }
      };

      const handleDeleteEvent = async (id) => {
        if (!window.confirm("確定要刪除這筆紀錄嗎？")) return;
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('timeline').doc(id).delete();
          setActionMenuEvent(null);
        } catch (e) {}
      };

      return (
        <div className="p-4 relative min-h-full">
          <div className="flex justify-between items-center mb-8 pt-4 px-2">
            <h2 className={`text-2xl font-bold ${theme.textDark}`}>時光軌跡</h2>
            <button onClick={openAddModal} className={`w-10 h-10 rounded-full ${theme.primary} text-white shadow-md flex items-center justify-center active:scale-95`}><Icon name="plus" className="text-lg"/></button>
          </div>

          <div className="relative w-full max-w-2xl mx-auto py-4">
            <div className="absolute left-1/2 top-0 bottom-0 w-0.5 bg-[#D3CDC4] transform -translate-x-1/2 rounded-full"></div>
            {timeline.length === 0 && <div className="text-center text-[#AFAFAF] mt-20 relative z-10">還沒有紀錄，點擊右上角新增。</div>}
            
            {timeline.map((event, index) => {
              const isLeft = index % 2 === 0;
              return (
                <div key={event.id} className={`relative flex items-center justify-between w-full mb-8 ${isLeft ? 'flex-row-reverse' : ''}`}>
                  <div className="w-5/12"></div>
                  <div className="w-2/12 flex justify-center z-10"><div className={`w-3.5 h-3.5 rounded-full border-2 border-white ${theme.primary} shadow-sm`}></div></div>
                  <div className={`w-5/12 flex ${isLeft ? 'justify-end pr-2' : 'justify-start pl-2'}`}>
                    <div className={`${theme.surface} p-4 rounded-2xl shadow-sm border ${theme.border} w-full max-w-[260px] relative group`}>
                      <button onClick={() => setActionMenuEvent(event)} className="absolute top-2 right-2 p-2 text-[#C5B8B1] hover:text-[#9BA495]"><Icon name="ellipsis-vertical" /></button>
                      <div className="text-[10px] text-[#A0A0A0] mb-1 pr-6">{event.date.replace('T', ' ')}</div>
                      <h3 className={`font-bold text-sm ${theme.textDark} mb-1 pr-4`}>{event.title}</h3>
                      {event.location && <div className="flex items-center text-[10px] text-[#9BA495] mb-2"><Icon name="location-dot" className="mr-1" /> {event.location}</div>}
                      <p className={`text-xs ${theme.textDark} whitespace-pre-wrap mb-2 leading-relaxed`}>{event.text}</p>
                      <div className="inline-block px-2 py-1 bg-[#F0ECE5] rounded-md text-[10px] text-[#7C7C7C]">心情: {event.mood}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* 操作彈窗 */}
          {actionMenuEvent && (
            <div className="fixed inset-0 bg-black/20 flex items-center justify-center z-[150] p-4" onClick={() => setActionMenuEvent(null)}>
              <div className={`${theme.surface} w-64 rounded-3xl p-3 shadow-xl flex flex-col`} onClick={e => e.stopPropagation()}>
                <div className="px-3 pb-2 border-b border-[#E5E0D8] mb-2"><span className="text-sm font-bold text-[#5C5C5C] truncate block">{actionMenuEvent.title}</span></div>
                <button onClick={() => openEditModal(actionMenuEvent)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-[#F4F1EA] text-[#5C5C5C]"><Icon name="pen" className="text-[#A2B2B7] w-5 text-center" /> <span>編輯</span></button>
                <button onClick={() => handleDeleteEvent(actionMenuEvent.id)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-red-50 text-red-500"><Icon name="trash" className="w-5 text-center" /> <span>刪除</span></button>
              </div>
            </div>
          )}

          {/* 新增/編輯彈窗 */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] pb-0 sm:p-4">
              <div className={`${theme.surface} w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl space-y-4 animate-slide-up pb-8 sm:pb-6`}>
                <h3 className={`text-lg font-bold ${theme.textDark}`}>{editEventId ? '編輯紀錄' : '紀錄新事件'}</h3>
                <div className="space-y-3">
                  <input type="text" placeholder="事件名稱" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.title} onChange={e => setEventData({...eventData, title: e.target.value})} />
                  <input type="datetime-local" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.date} onChange={e => setEventData({...eventData, date: e.target.value})} />
                  <input type="text" placeholder="地點 (選填)" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm`} value={eventData.location} onChange={e => setEventData({...eventData, location: e.target.value})} />
                  <textarea placeholder="紀錄詳細的心情與細節..." rows="3" className={`w-full p-3.5 rounded-xl bg-white border ${theme.border} outline-none text-sm resize-none`} value={eventData.text} onChange={e => setEventData({...eventData, text: e.target.value})} />
                  <div className="flex items-center space-x-3 bg-white p-2 rounded-xl border border-[#E5E0D8]">
                    <div className="p-2 bg-[#F4F1EA] rounded-lg"><Icon name="face-smile" className="text-[#9BA495]" /></div>
                    <select className={`flex-1 p-2 bg-transparent outline-none text-sm`} value={eventData.mood} onChange={e => setEventData({...eventData, mood: e.target.value})}>
                      <option>平靜</option><option>開心</option><option>期待</option><option>感動</option><option>傷心</option><option>生氣</option><option>疲憊</option>
                    </select>
                  </div>
                </div>
                {errorMsg && <p className="text-[#D1A3A3] text-sm text-center">{errorMsg}</p>}
                <div className="flex space-x-3 pt-3">
                  <button onClick={() => setIsModalOpen(false)} className="flex-1 py-3.5 rounded-2xl bg-[#EBEBEB] text-[#7C7C7C] font-medium text-sm">取消</button>
                  <button onClick={handleSaveEvent} className={`flex-1 py-3.5 rounded-2xl ${theme.primary} text-white font-medium text-sm`}>{loading ? <Icon name="spinner fa-spin"/> : '儲存'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 4. 資料庫 (含切片上傳)
    // ==========================================
    const CHUNK_SIZE = 700000;
    function DatabaseTab({ user, folders, files }) {
      const [currentFolder, setCurrentFolder] = useState(null);
      const [isUploadModalOpen, setIsUploadModalOpen] = useState(false);
      const [uploadError, setUploadError] = useState('');
      const [previewFile, setPreviewFile] = useState(null);
      const [fullDataUrl, setFullDataUrl] = useState('');
      const [isPreviewLoading, setIsPreviewLoading] = useState(false);
      const [actionMenuFile, setActionMenuFile] = useState(null);
      
      const [uploadData, setUploadData] = useState({ folderId: '', newFolderName: '', name: '', note: '', dataUrl: '', type: '', size: 0 });
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setUploadData({ ...uploadData, name: file.name, type: file.type || 'unknown', dataUrl: event.target.result, size: file.size });
          setUploadError('');
        };
        reader.readAsDataURL(file); 
      };

      const handleUploadSubmit = async () => {
        if (!uploadData.dataUrl && uploadData.type !== 'text') return setUploadError("請選擇檔案");
        if (!uploadData.folderId && !uploadData.newFolderName) return setUploadError("請選擇資料夾");
        if (!uploadData.name) return setUploadError("請填寫檔案名稱");

        setIsUploading(true);
        try {
          let targetFolderId = uploadData.folderId;
          if (!targetFolderId) {
            const folderRef = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('folders').add({ name: uploadData.newFolderName, createdAt: Date.now() });
            targetFolderId = folderRef.id;
          }

          const base64Str = uploadData.dataUrl;
          const totalChunks = Math.ceil(base64Str.length / CHUNK_SIZE);
          
          const fileRef = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('files').add({
            folderId: targetFolderId, name: uploadData.name, type: uploadData.type, note: uploadData.note, size: uploadData.size, chunksCount: totalChunks, createdAt: Date.now()
          });

          for (let i = 0; i < totalChunks; i++) {
            await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('files').doc(fileRef.id).collection('chunks').doc(i.toString()).set({ data: base64Str.slice(i * CHUNK_SIZE, (i + 1) * CHUNK_SIZE) });
            setUploadProgress(10 + Math.floor(((i + 1) / totalChunks) * 90));
          }
          setIsUploadModalOpen(false);
        } catch (error) { setUploadError("上傳失敗"); } 
        finally { setIsUploading(false); setUploadProgress(0); }
      };

      const loadFullFile = async (file, action) => {
        setIsPreviewLoading(true); setActionMenuFile(null);
        try {
          let combinedData = '';
          for (let i = 0; i < file.chunksCount; i++) {
            const chunkSnap = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('files').doc(file.id).collection('chunks').doc(i.toString()).get();
            if (chunkSnap.exists) combinedData += chunkSnap.data().data;
          }
          if (action === 'download') {
            const link = document.createElement('a');
            link.href = file.type === 'text' ? `data:text/plain;charset=utf-8,${encodeURIComponent(combinedData)}` : combinedData;
            link.download = file.name;
            link.click();
          } else {
            setFullDataUrl(combinedData); setPreviewFile(file);
          }
        } catch (e) { alert("讀取失敗"); } 
        finally { setIsPreviewLoading(false); }
      };

      const handleDelete = async (file) => {
        if (!window.confirm("確定刪除檔案？")) return;
        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('files').doc(file.id).delete();
        setActionMenuFile(null);
      };

      const currentFiles = files.filter(f => f.folderId === currentFolder?.id);

      return (
        <div className="p-4 h-full flex flex-col relative">
          <div className="flex justify-between items-center mb-6 pt-4 px-2">
            <div className="flex items-center space-x-3">
              {currentFolder && <button onClick={() => setCurrentFolder(null)} className="p-2"><Icon name="arrow-left" className="text-xl" /></button>}
              <h2 className={`text-2xl font-bold ${theme.textDark}`}>{currentFolder ? currentFolder.name : '資料庫'}</h2>
            </div>
            <button onClick={() => { setUploadData({ folderId: currentFolder?.id || '', newFolderName: '', name: '', note: '', dataUrl: '', type: '', size: 0 }); setIsUploadModalOpen(true); }} className={`w-10 h-10 rounded-full ${theme.primary} text-white shadow-md flex justify-center items-center`}><Icon name="plus" /></button>
          </div>

          <div className="flex-1 overflow-y-auto pb-6">
            {isPreviewLoading && (
              <div className="absolute inset-0 bg-white/60 backdrop-blur-sm flex flex-col items-center justify-center z-50">
                <Icon name="spinner fa-spin" className="text-4xl text-[#9BA495] mb-4" />
                <p className="text-sm font-bold text-[#7C7C7C] tracking-widest">無損讀取中...</p>
              </div>
            )}

            {!currentFolder ? (
              <div className="grid grid-cols-2 gap-4 px-2">
                {folders.length === 0 && <div className="col-span-2 text-center text-[#AFAFAF] mt-10">尚無資料夾</div>}
                {folders.map(folder => (
                  <div key={folder.id} onClick={() => setCurrentFolder(folder)} className={`${theme.surface} p-5 rounded-3xl shadow-sm border ${theme.border} flex flex-col items-center cursor-pointer active:scale-95`}>
                    <Icon name="folder" className="text-4xl text-[#C5B8B1] mb-3 opacity-80" />
                    <span className={`font-medium text-sm ${theme.textDark} w-full text-center truncate`}>{folder.name}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div className="space-y-3 px-2">
                {currentFiles.length === 0 && <div className="text-center text-[#AFAFAF] mt-10">空的</div>}
                {currentFiles.map(file => (
                  <div key={file.id} className={`${theme.surface} p-3 rounded-2xl shadow-sm border ${theme.border} flex items-center justify-between`}>
                    <div className="flex items-center space-x-3 flex-1 overflow-hidden" onClick={() => loadFullFile(file, 'preview')}>
                      <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${theme.bg}`}>
                        <Icon name={file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : file.type.startsWith('audio/') ? 'music' : 'file-lines'} className="text-[#A0A0A0] text-lg" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <h4 className={`text-sm font-medium ${theme.textDark} truncate`}>{file.name}</h4>
                        {file.note && <p className="text-[10px] text-[#A0A0A0] truncate">{file.note}</p>}
                      </div>
                    </div>
                    <button onClick={() => setActionMenuFile(file)} className="p-3 text-[#C5B8B1] active:text-[#9BA495]"><Icon name="ellipsis-vertical" /></button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* 上傳彈窗 */}
          {isUploadModalOpen && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[100] pb-0 sm:p-4">
              <div className={`${theme.surface} w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-xl space-y-4 animate-slide-up relative pb-8`}>
                {isUploading && (
                  <div className="absolute inset-0 bg-white/90 z-10 flex flex-col items-center justify-center rounded-t-3xl sm:rounded-3xl">
                    <Icon name="spinner fa-spin" className="text-4xl text-[#9BA495] mb-4" />
                    <p className="font-bold text-[#5C5C5C] text-sm">無損加密上傳中...</p>
                    <div className="w-2/3 h-1.5 bg-[#F4F1EA] rounded-full mt-3 overflow-hidden"><div className={`h-full ${theme.primary} transition-all`} style={{width: `${uploadProgress}%`}}></div></div>
                  </div>
                )}
                <h3 className={`text-lg font-bold ${theme.textDark}`}>上傳檔案</h3>
                <div className="space-y-2">
                  <select className={`w-full p-3 rounded-xl bg-white border ${theme.border} text-sm`} value={uploadData.folderId} onChange={e => setUploadData({...uploadData, folderId: e.target.value, newFolderName: ''})}>
                    <option value="">-- 建立新資料夾 --</option>
                    {folders.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                  </select>
                  {!uploadData.folderId && <input type="text" placeholder="新資料夾名稱" className={`w-full p-3 rounded-xl bg-white border ${theme.border} text-sm mt-2`} value={uploadData.newFolderName} onChange={e => setUploadData({...uploadData, newFolderName: e.target.value})} />}
                </div>
                <div className="flex space-x-2">
                  <button onClick={() => setUploadData({...uploadData, type: 'text', dataUrl: '', name: '純文字筆記'})} className={`flex-1 py-2 text-sm rounded-lg border ${uploadData.type === 'text' ? 'bg-[#F0ECE5] border-[#9BA495] text-[#9BA495]' : 'border-[#E5E0D8] bg-white'}`}>文字</button>
                  <label className={`flex-1 py-2 text-sm text-center rounded-lg border cursor-pointer ${uploadData.type !== 'text' && uploadData.type !== '' ? 'bg-[#F0ECE5] border-[#9BA495] text-[#9BA495]' : 'border-[#E5E0D8] bg-white'}`}>媒體 <input type="file" className="hidden" onChange={handleFileChange} /></label>
                </div>
                {uploadData.type === 'text' ? <textarea placeholder="輸入內容..." rows="3" className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.dataUrl} onChange={e => setUploadData({...uploadData, dataUrl: e.target.value})} /> : uploadData.dataUrl && <div className="text-xs text-[#9BA495]"><Icon name="circle-check"/> 已選擇檔案</div>}
                <input type="text" placeholder="檔案名稱 (含副檔名)" className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.name} onChange={e => setUploadData({...uploadData, name: e.target.value})} />
                <input type="text" placeholder="加入備註..." className={`w-full p-3 rounded-xl border ${theme.border} text-sm`} value={uploadData.note} onChange={e => setUploadData({...uploadData, note: e.target.value})} />
                {uploadError && <p className="text-red-400 text-xs text-center">{uploadError}</p>}
                <div className="flex space-x-3 pt-2">
                  <button onClick={() => setIsUploadModalOpen(false)} className="flex-1 py-3 rounded-xl bg-[#EBEBEB] text-sm font-bold text-[#7C7C7C]">取消</button>
                  <button onClick={handleUploadSubmit} className={`flex-1 py-3 rounded-xl ${theme.primary} text-white text-sm font-bold`}>上傳</button>
                </div>
              </div>
            </div>
          )}

          {/* 檔案選單 */}
          {actionMenuFile && (
            <div className="fixed inset-0 bg-black/20 flex items-end sm:items-center justify-center z-[150] pb-6 sm:p-0" onClick={() => setActionMenuFile(null)}>
              <div className={`${theme.surface} w-[90%] sm:w-80 rounded-3xl p-4 shadow-xl flex flex-col space-y-2`} onClick={e => e.stopPropagation()}>
                <div className="pb-3 border-b border-[#E5E0D8] px-2"><h4 className="font-bold text-sm text-[#5C5C5C] truncate">{actionMenuFile.name}</h4></div>
                <button onClick={() => loadFullFile(actionMenuFile, 'download')} className="flex items-center space-x-3 p-3 rounded-xl active:bg-[#F4F1EA] text-[#5C5C5C] text-sm"><Icon name="download" className="text-[#9BA495] w-5 text-center" /> <span>下載原始檔</span></button>
                <button onClick={() => handleDelete(actionMenuFile)} className="flex items-center space-x-3 p-3 rounded-xl active:bg-red-50 text-red-500 text-sm"><Icon name="trash" className="w-5 text-center" /> <span>永久刪除</span></button>
              </div>
            </div>
          )}

          {/* 預覽器 */}
          {previewFile && (
            <div className="fixed inset-0 bg-black/95 flex flex-col z-[300]">
              <div className="flex justify-between items-center p-4 text-white bg-gradient-to-b from-black/60 pt-[max(1rem,env(safe-area-inset-top))]">
                <button onClick={() => { setPreviewFile(null); setFullDataUrl(''); }} className="p-2"><Icon name="arrow-left" className="text-xl" /></button>
                <span className="font-medium text-sm truncate max-w-[60%]">{previewFile.name}</span>
                <button onClick={() => loadFullFile(previewFile, 'download')} className="p-2"><Icon name="download" className="text-lg" /></button>
              </div>
              <div className="flex-1 flex items-center justify-center p-4 overflow-auto">
                {previewFile.type.startsWith('image/') && <img src={fullDataUrl} className="max-w-full max-h-full object-contain" />}
                {previewFile.type.startsWith('video/') && <video src={fullDataUrl} controls autoPlay className="max-w-full max-h-full" />}
                {previewFile.type.startsWith('audio/') && <div className="bg-[#2A2A2A] p-8 rounded-3xl"><Icon name="music" className="text-5xl text-white mb-6 block text-center opacity-80" /><audio src={fullDataUrl} controls autoPlay /></div>}
                {previewFile.type === 'text' && <div className="bg-white p-6 rounded-xl w-full max-w-lg min-h-[50%] overflow-y-auto whitespace-pre-wrap text-[#4A4A4A] text-sm">{fullDataUrl}</div>}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 5. 搜索頁面
    // ==========================================
    function SearchTab({ timeline, files }) {
      const [keyword, setKeyword] = useState('');
      const results = useMemo(() => {
        if (!keyword.trim()) return { events: [], files: [] };
        const lowerKw = keyword.toLowerCase();
        return {
          events: timeline.filter(e => e.title.toLowerCase().includes(lowerKw) || e.text.toLowerCase().includes(lowerKw)),
          files: files.filter(f => f.name.toLowerCase().includes(lowerKw) || (f.note && f.note.toLowerCase().includes(lowerKw)))
        };
      }, [keyword, timeline, files]);

      return (
        <div className="p-4 h-full flex flex-col">
          <div className="pt-4 px-2 mb-6">
            <h2 className={`text-2xl font-bold ${theme.textDark} mb-4`}>全域搜索</h2>
            <div className="relative">
              <Icon name="magnifying-glass" className={`absolute left-4 top-4 ${theme.textLight}`} />
              <input type="text" placeholder="尋找回憶或資料..." className={`w-full pl-12 pr-4 py-3.5 rounded-2xl bg-white shadow-sm border ${theme.border} outline-none text-sm`} value={keyword} onChange={e => setKeyword(e.target.value)} />
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-2 space-y-6">
            {!keyword.trim() && <div className="text-center text-[#AFAFAF] mt-20"><Icon name="magnifying-glass" className="text-4xl opacity-20 mb-3 block" /><p className="text-sm">輸入關鍵字尋找</p></div>}
            {keyword.trim() && results.events.length === 0 && results.files.length === 0 && <div className="text-center text-sm text-[#AFAFAF] mt-10">找不到相關結果</div>}
            {results.events.length > 0 && (
              <div>
                <h3 className={`font-bold ${theme.textLight} mb-3 text-xs`}>時光軌跡</h3>
                <div className="space-y-3">{results.events.map(e => <div key={e.id} className={`${theme.surface} p-4 rounded-2xl border ${theme.border}`}><h4 className="font-bold text-sm">{e.title}</h4><p className="text-xs text-[#A0A0A0] my-1">{e.date}</p><p className="text-xs line-clamp-2">{e.text}</p></div>)}</div>
              </div>
            )}
            {results.files.length > 0 && (
              <div>
                <h3 className={`font-bold ${theme.textLight} mb-3 text-xs`}>資料庫</h3>
                <div className="space-y-3">{results.files.map(f => <div key={f.id} className={`${theme.surface} p-3 rounded-2xl border ${theme.border} flex items-center space-x-3`}><Icon name="file-lines" className="text-[#A0A0A0] text-lg w-8 text-center" /><span className="text-sm font-medium truncate">{f.name}</span></div>)}</div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 6. 個人頁面 (包含 Canvas 壓縮與 PWA 安裝教學)
    // ==========================================
    function ProfileTab({ user, profile, onLock }) {
      const [isEditing, setIsEditing] = useState(false);
      const [editForm, setEditForm] = useState(profile);
      const [showPwaGuide, setShowPwaGuide] = useState(false);
      const fileInputRef = useRef(null);
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

      const handleAvatarChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 300;
            let { width, height } = img;
            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setEditForm({ ...editForm, avatar: canvas.toDataURL('image/jpeg', 0.8) });
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSave = async () => {
        const profileRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('profile').doc('main');
        await profileRef.set(editForm);
        setIsEditing(false);
      };

      return (
        <div className="p-4 flex flex-col items-center relative h-full">
          <div className="w-full flex justify-end pt-2 pr-2 mb-4 h-10">
            {isEditing ? <button onClick={handleSave} className={`px-4 py-1.5 rounded-full ${theme.primary} text-white text-xs font-bold`}>儲存</button>
             : <button onClick={() => { setEditForm(profile); setIsEditing(true); }} className="p-2 text-[#A0A0A0]"><Icon name="pen" /></button>}
          </div>

          <div className="relative mb-6">
            <div className={`w-24 h-24 rounded-full border-[3px] border-white shadow-md overflow-hidden bg-[#F0ECE5] flex items-center justify-center`}>
              {(isEditing ? editForm.avatar : profile.avatar) ? <img src={isEditing ? editForm.avatar : profile.avatar} className="w-full h-full object-cover" /> : <Icon name="user" className="text-3xl text-[#C5B8B1]" />}
            </div>
            {isEditing && <button onClick={() => fileInputRef.current?.click()} className="absolute bottom-0 right-0 p-2 bg-white rounded-full shadow border border-gray-100"><Icon name="pen" className="text-[#A2B2B7] text-xs" /></button>}
            <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleAvatarChange} />
          </div>

          {isEditing ? (
            <div className="w-full max-w-sm space-y-4 px-4">
              <input type="text" className={`w-full p-3 text-center text-lg font-bold rounded-xl border ${theme.border} outline-none`} value={editForm.username} onChange={e => setEditForm({...editForm, username: e.target.value})} placeholder="名字" />
              <textarea className={`w-full p-3 text-center rounded-xl border ${theme.border} text-sm resize-none outline-none`} rows="2" value={editForm.bio} onChange={e => setEditForm({...editForm, bio: e.target.value})} placeholder="文案..." />
            </div>
          ) : (
            <div className="text-center w-full max-w-sm px-4">
              <h2 className={`text-xl font-bold ${theme.textDark} mb-2`}>{profile.username || '新用戶'}</h2>
              <p className="text-[#8C8C8C] text-sm leading-relaxed whitespace-pre-wrap">{profile.bio || '寫下個性文案...'}</p>
            </div>
          )}

          {!isEditing && (
            <div className="w-full max-w-sm mt-10 space-y-3 px-4">
              <button onClick={() => setShowPwaGuide(true)} className={`${theme.surface} w-full rounded-2xl border ${theme.border} p-4 flex items-center justify-between active:bg-[#F4F1EA]`}>
                <div className="flex items-center space-x-3 text-[#5C5C5C] font-bold text-sm"><div className="p-2 bg-[#E8F1ED] rounded-xl"><Icon name="mobile-screen" className="text-[#9BA495]" /></div><span>安裝 App 至主畫面</span></div>
                <span className="text-[10px] bg-[#F4F1EA] px-2 py-1 rounded">推薦</span>
              </button>
              
              <button onClick={() => window.confirm("確定登出並鎖定？") && onLock()} className="w-full flex justify-center space-x-2 p-4 mt-4 text-[#A0A0A0] text-sm font-bold"><Icon name="right-from-bracket" /> <span>鎖定手札</span></button>
            </div>
          )}

          {/* 安裝教學 */}
          {showPwaGuide && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-[200] pb-0 sm:p-4" onClick={() => setShowPwaGuide(false)}>
              <div className={`${theme.surface} w-full max-w-sm rounded-t-3xl sm:rounded-3xl p-6 pb-8 shadow-xl animate-slide-up`} onClick={e => e.stopPropagation()}>
                <div className="text-center mb-6">
                  <div className="w-16 h-16 bg-[#F4F1EA] rounded-3xl flex items-center justify-center mx-auto mb-3"><Icon name="mobile-screen" className="text-2xl text-[#9BA495]"/></div>
                  <h3 className={`text-lg font-bold ${theme.textDark}`}>安裝至手機桌面</h3>
                  <p className="text-xs text-[#8C8C8C] mt-1">隱藏網址列，開啟全螢幕 App 體驗</p>
                </div>
                <div className="space-y-4 bg-[#F4F1EA] p-5 rounded-2xl">
                  {isIOS ? (
                    <>
                      <div className="flex items-center space-x-3 text-sm text-[#5C5C5C]"><div className="w-6 h-6 rounded-full bg-white flex justify-center items-center shadow-sm"><span className="font-bold text-xs text-[#9BA495]">1</span></div><p>點擊瀏覽器下方 <Icon name="share-from-square" className="mx-1"/> <strong>分享</strong></p></div>
                      <div className="flex items-center space-x-3 text-sm text-[#5C5C5C]"><div className="w-6 h-6 rounded-full bg-white flex justify-center items-center shadow-sm"><span className="font-bold text-xs text-[#9BA495]">2</span></div><p>選擇 <strong>「加入主畫面」</strong></p></div>
                    </>
                  ) : (
                    <>
                      <div className="flex items-center space-x-3 text-sm text-[#5C5C5C]"><div className="w-6 h-6 rounded-full bg-white flex justify-center items-center shadow-sm"><span className="font-bold text-xs text-[#9BA495]">1</span></div><p>點擊瀏覽器右上角 <Icon name="ellipsis-vertical" className="mx-1"/> <strong>選單</strong></p></div>
                      <div className="flex items-center space-x-3 text-sm text-[#5C5C5C]"><div className="w-6 h-6 rounded-full bg-white flex justify-center items-center shadow-sm"><span className="font-bold text-xs text-[#9BA495]">2</span></div><p>選擇 <strong>「加到主畫面」</strong></p></div>
                    </>
                  )}
                </div>
                <button onClick={() => setShowPwaGuide(false)} className={`w-full py-3.5 mt-5 rounded-xl ${theme.primary} text-white font-bold text-sm`}>我了解了</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
